    <section class="page-header">

      <p class="section-label mb-2">Full collection</p>
      <h1 class="display-font h2 mb-2">Shop</h1>
      <p class="text-ink-soft mb-0">Three categories. Filter by category or search by name, the grid updates instantly.</p>

<section class="py-4">
    <div class="container">
      <div class="row gy-3 align-items-center mb-4">
        <div class="col-lg-8">
          <div class="d-flex flex-wrap gap-2" role="group" aria-label="Filter products by category">
            <button type="button" class="category-pill active" data-category="all">All</button>
            <button type="button" class="category-pill" data-category="men">Men</button>
            <button type="button" class="category-pill" data-category="women">Women</button>
            <button type="button" class="category-pill" data-category="kids">Kids</button>
            <button type="button" class="category-pill" data-category="accessories">Accessories</button>
          </div>
        </div>
        <div class="col-lg-4">
          <label class="visually-hidden" for="product-search">Search products</label>
          <div class="input-group">
            <span class="input-group-text bg-canvas-soft border-line"><i class="bi bi-search" aria-hidden="true"></i></span>
            <input type="search" id="product-search" class="form-control" placeholder="Search products…">
          </div>
        </div>
      </div>

      <p id="shop-empty-state" class="text-center text-ink-soft py-5 d-none">No products match your search. Try a different term or category.</p>
